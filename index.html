<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Changer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Color Changer</h1>

    <div id="color-box">
      <span id="hex-label">#3A86FF</span>
    </div>

    <button id="change-color-btn">
      <span class="btn-text">Change Color</span>
      <span class="btn-arrow">→</span>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
